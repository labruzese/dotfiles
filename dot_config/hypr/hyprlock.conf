# BACKGROUND
background {
    monitor =
    path = ~/wallpapers/quest-finding-with-cats.png
    blur_passes = 0
    contrast = 0.8916
    brightness = 0.8916
    vibrancy = 0.8916
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# CONTAINER BOX (semi-transparent)
shape {
    monitor = DP-3
    size = 380, 380
    color = rgba(228, 125, 76, 0.0)
    shadow_passes = 9
    shadow_size = 1
    shadow_boost = 3 
    shadow_color = rgb(228, 125, 76)
    rounding = 15
    rotate = 0
    xray = false
    position = 0,0
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = rgba(216, 222, 233, 0.80)
    font_size = 88
    font_family = SF Pro Display Bold
    position = 0, 120
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgba(206, 212, 223, .70)
    font_size = 22
    font_family = SF Pro Display Bold
    position = 0, 42
    halign = center
    valign = center
}

# USER-BOX
shape {
    monitor = DP-3
    size = 150, 55
    color = rgba(252, 148, 95, 0.7)

    rounding = -1
    border_size = 0
    border_color = rgba(255, 255, 255, 1)
    rotate = 0
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)

    position = 0, -510
    halign = center
    valign = center
}

# USER
label {
    monitor = DP-3
    text =     $USER
    color = rgba(216, 222, 233, 0.80)
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    font_size = 16
    font_family = SF Pro Display Bold
    position = 0, -510
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor = DP-3
    size = 270, 55
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(250, 250, 250, 0.3)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##ffffff99">🔒  shh...</span></i>
    hide_input = false
    position = 0, -575
    halign = center
    valign = center
